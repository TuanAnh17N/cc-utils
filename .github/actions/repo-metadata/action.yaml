name: repo-metadata
description: Retrieve repository metadata using the GitHub API
inputs:
  gh-token:
    description: GitHub token to query the API
    required: true
outputs:
  fork:
    description: Repository fork status (true if fork, false otherwise)
  private:
    description: Repository privacy status (true if private, false otherwise)
  default-branch:
    description: Default branch of the repository (branch name only, e.g., master)
  archived:
    description: Repository archived status (true if archived, false otherwise)
runs:
  using: composite
  steps:
    - name: Retrieve repository metadata
      shell: bash
      run: |
        set -euo pipefail
        # Query the GitHub API for repository data
        repo_json=$(
          curl -sL --fail \
          -H 'Authorization: Bearer ${{ inputs.gh-token }}' \
          https://api.github.com/repos/${{ github.repository }}
        )

        # Extract attributes
        fork=$(echo "$repo_json" | jq -r .fork)
        private=$(echo "$repo_json" | jq -r .private)
        default_branch=$(echo "$repo_json" | jq -r .default_branch)
        archived=$(echo "$repo_json" | jq -r .archived)

        # Output
        echo "fork=$fork" >> $GITHUB_OUTPUT
        echo "private=$private" >> $GITHUB_OUTPUT
        echo "default-branch=$default_branch" >> $GITHUB_OUTPUT
        echo "archived=$archived" >> $GITHUB_OUTPUT
outputs:
  fork: ${{ steps.metadata.outputs.fork }}
  private: ${{ steps.metadata.outputs.private }}
  default-branch: ${{ steps.metadata.outputs.default_branch }}
  archived: ${{ steps.metadata.outputs.archived }}